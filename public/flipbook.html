<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcovia — The World's First Ambition Building Program for Teenagers</title>
  <script src="/page-flip.browser.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0B1120;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
    }

    /* ── Top bar ── */
    .top-bar {
      width: 100%;
      background: #002C45;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 2px solid #EABF36;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .top-bar .brand {
      color: #EABF36;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .top-bar .tagline {
      color: #8899AA;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
    }

    /* ── Side nav arrows ── */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 150;
      background: none;
      border: none;
      color: rgba(234, 191, 54, 0.25);
      font-size: 5rem;
      line-height: 1;
      cursor: pointer;
      padding: 16px 20px;
      transition: color 0.2s, transform 0.2s;
      user-select: none;
      -webkit-user-select: none;
    }

    .nav-arrow:hover {
      color: rgba(234, 191, 54, 0.75);
      transform: translateY(-50%) scale(1.1);
    }

    .nav-arrow:disabled {
      opacity: 0;
      pointer-events: none;
    }

    #nav-prev { left: 0; }
    #nav-next { right: 0; }

    /* Hide side arrows on mobile — not enough space */
    @media (max-width: 768px) {
      .nav-arrow { display: none; }
    }

    /* ── Fullscreen button ── */
    .fs-btn {
      background: transparent;
      color: #8899AA;
      border: 1px solid #4A6070;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .fs-btn:hover {
      color: #EABF36;
      border-color: #EABF36;
    }

    /* ── Flipbook container ── */
    #flipbook-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100%;
      padding: 0 16px;
      flex: 1;
    }

    #flipbook {
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    /* ── Page images ── */
    .page-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      backface-visibility: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Fullscreen mode ── */
    body.is-fullscreen {
      justify-content: center;
      overflow: hidden;
    }

    body.is-fullscreen .top-bar {
      display: none;
    }

    body.is-fullscreen #flipbook-wrap {
      align-items: center;
      padding: 0;
      width: 100vw;
      height: 100vh;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .top-bar {
        flex-wrap: wrap;
        gap: 4px;
        padding: 8px 12px;
      }

      .top-bar .tagline {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="brand">Alcovia Brochure</div>
    <div class="tagline">The World's First Ambition Building Program</div>
    <button class="fs-btn" id="fs-btn">⛶ Fullscreen</button>
  </div>

  <button class="nav-arrow" id="nav-prev" disabled>&#8249;</button>
  <button class="nav-arrow" id="nav-next" disabled>&#8250;</button>

  <div id="flipbook-wrap">
    <div id="flipbook">
      <div style="
        color: #EABF36;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 300px;
        padding: 40px;
        text-align: center;
      ">
        Loading flipbook... this may take a moment on first load.
      </div>
    </div>
  </div>

  <script>
    const A4_RATIO = 595 / 842;
    const MAX_WIDTH = 2200;
    const CHROME_DEDUCTION = 160;

    let currentPage = 0;
    let totalPages = 0;
    let pageFlip = null;
    let images = [];

    function getBookDimensions() {
      const isIframe = window.parent !== window;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const isMobile = vw < 768;
      const maxW = Math.min(vw - (isMobile ? 16 : 32), MAX_WIDTH);
      let pageW = Math.floor(isMobile ? maxW : maxW / 2);
      let pageH = Math.floor(pageW / A4_RATIO);
      const maxH = vh - (isIframe ? 20 : CHROME_DEDUCTION);
      if (pageH > maxH) {
        pageH = maxH;
        pageW = Math.floor(pageH * A4_RATIO);
      }
      return { width: pageW, height: pageH };
    }

    async function initFlipbook() {
      try {
        console.log('%c=== FLIPBOOK INITIALIZATION START ===', 'color: #EABF36; font-weight: bold; font-size: 14px;');

        if (typeof PageFlip === 'undefined') {
          throw new Error('PageFlip library not loaded. Check browser console for script loading errors.');
        }

        let res;
        let retryCount = 0;
        const maxRetries = 3;

        while (retryCount < maxRetries) {
          try {
            res = await fetch('/images.json', { cache: 'no-store' });
            if (res.ok) break;
            retryCount++;
            if (retryCount < maxRetries) await new Promise(r => setTimeout(r, 500));
          } catch (e) {
            retryCount++;
            if (retryCount < maxRetries) await new Promise(r => setTimeout(r, 500));
          }
        }

        if (!res || !res.ok) {
          throw new Error(`Failed to load /images.json (${res?.status || 'no response'} ${res?.statusText || ''}). Verify file exists in public/images.json`);
        }

        images = await res.json();
        totalPages = images.length;
        if (totalPages === 0) throw new Error('No images found in images.json');

        const container = document.getElementById('flipbook');
        container.innerHTML = '';
        const dims = getBookDimensions();

        const pageElements = images.map((src, i) => {
          const div = document.createElement('div');
          div.style.cssText = 'width:100%;height:100%;background:#0B1120;position:relative;overflow:hidden;';
          const img = document.createElement('img');
          img.src = src;
          img.className = 'page-img';
          img.alt = `Page ${i + 1}`;
          img.style.imageRendering = 'crisp-edges';
          div.appendChild(img);
          return div;
        });

        pageFlip = new PageFlip(container, {
          width: dims.width,
          height: dims.height,
          size: 'fixed',
          startPage: 0,
          drawShadow: true,
          flippingTime: 900,
          usePortrait: true,
          startZIndex: 0,
          autoSize: true,
          maxShadowOpacity: 0.5,
          showCover: true,
          mobileScrollSupport: false,
          swipeDistance: 30,
          clickEventForward: true,
        });

        pageFlip.loadFromHTML(pageElements);

        pageFlip.on('flip', (e) => {
          currentPage = e.data;
          updateUI();
        });

        setupEventListeners();
        updateUI();

        console.log('%c=== FLIPBOOK INITIALIZATION COMPLETE ===', 'color: #4CAF50; font-weight: bold; font-size: 14px;');
      } catch (err) {
        console.error('Flipbook init error:', err);
        const msg = err?.message || String(err);
        const errorHtml = `
          <div style="
            background: #1a1a1a;
            border: 3px solid #EE6C4D;
            color: #fff;
            padding: 30px;
            margin: 20px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            max-width: 600px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
          ">
            <div style="color: #EE6C4D; font-weight: bold; margin-bottom: 16px; font-size: 18px;">
              ❌ ERROR LOADING FLIPBOOK
            </div>
            <div style="color: #FFB74D; margin-bottom: 12px;">${msg}</div>
            <div style="color: #8899AA; font-size: 12px; margin-top: 20px;">
              • Check browser console (F12) for more details<br/>
              • Try refreshing the page (Ctrl+Shift+R)<br/>
              • Verify /images.json exists and is accessible
            </div>
          </div>
        `;
        document.getElementById('flipbook').innerHTML = errorHtml;
        document.getElementById('flipbook').style.cssText = 'display:flex;justify-content:center;align-items:center;min-height:400px;';
      }
    }

    function updateUI() {
      const prevBtn = document.getElementById('nav-prev');
      const nextBtn = document.getElementById('nav-next');
      if (prevBtn) prevBtn.disabled = currentPage <= 0;
      if (nextBtn) nextBtn.disabled = currentPage >= totalPages - 1;
      if (window.parent !== window) {
        window.parent.postMessage({ type: 'FLIPBOOK_STATE', currentPage, totalPages }, '*');
      }
    }

    function setupEventListeners() {
      // Side arrow buttons
      document.getElementById('nav-prev').addEventListener('click', () => pageFlip.flipPrev());
      document.getElementById('nav-next').addEventListener('click', () => pageFlip.flipNext());

      // Keyboard navigation
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { pageFlip.flipNext(); e.preventDefault(); }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { pageFlip.flipPrev(); e.preventDefault(); }
      });

      // Fullscreen toggle
      document.getElementById('fs-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => { });
        } else {
          document.exitFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', () => {
        document.body.classList.toggle('is-fullscreen', !!document.fullscreenElement);
        const btn = document.getElementById('fs-btn');
        if (btn) btn.textContent = document.fullscreenElement ? '✕ Exit' : '⛶ Fullscreen';
        setTimeout(() => {
          const dims = document.fullscreenElement ? getFullscreenDims() : getBookDimensions();
          pageFlip.updateFromData({ width: dims.width, height: dims.height });
        }, 80);
      });

      // Resize
      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          if (!document.fullscreenElement) {
            const dims = getBookDimensions();
            pageFlip.updateFromData({ width: dims.width, height: dims.height });
          }
        }, 150);
      });
    }

    function getFullscreenDims() {
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      let pH = sh;
      let pW = Math.floor(pH * A4_RATIO);
      if (pW * 2 > sw) {
        pW = Math.floor(sw / 2);
        pH = Math.floor(pW / A4_RATIO);
      }
      return { width: pW, height: pH };
    }

    // Handle messages from parent
    window.addEventListener('message', (event) => {
      const { command } = event.data;
      if (!pageFlip) return;
      if (command === 'prev') pageFlip.flipPrev();
      if (command === 'next') pageFlip.flipNext();
      if (command === 'fullscreen') {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => { });
        } else {
          document.exitFullscreen();
        }
      }
    });

    // Hide top-bar when embedded in iframe; fill iframe exactly with no gaps
    if (window.parent !== window) {
      document.querySelector('.top-bar').style.display = 'none';
      document.documentElement.style.cssText = 'height:100%;overflow:hidden;';
      document.body.style.cssText = 'height:100%;min-height:unset;overflow:hidden;background:#0B1120;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    }

    // Wait for PageFlip library then init
    (async () => {
      let attempts = 0;
      while (typeof window.St === 'undefined' && attempts < 100) {
        await new Promise(r => setTimeout(r, 100));
        attempts++;
      }
      if (typeof window.St === 'undefined') {
        const errorHtml = `
          <div style="background:#1a1a1a;border:3px solid #EE6C4D;color:#fff;padding:30px;margin:20px;border-radius:8px;font-family:monospace;font-size:14px;max-width:600px;line-height:1.6;">
            <div style="color:#EE6C4D;font-weight:bold;margin-bottom:16px;font-size:18px;">❌ LIBRARY LOAD ERROR</div>
            <div style="color:#FFB74D;">PageFlip library failed to load. Try hard refresh (Ctrl+Shift+R).</div>
          </div>`;
        document.getElementById('flipbook').innerHTML = errorHtml;
        document.getElementById('flipbook').style.cssText = 'display:flex;justify-content:center;align-items:center;min-height:400px;';
      } else {
        window.PageFlip = window.St.PageFlip;
        initFlipbook();
      }
    })();
  </script>
</body>

</html>
